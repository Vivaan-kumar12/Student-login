<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="background-animation">

<span></span>

<h1>Student Login</h1>

<p class="subtitle">

</p>

        <div class="input-box">

<span>👤</span>

<input

id="studentName"

<span>🔒</span>

<input
type="number"
id="rollNumber"
placeholder="Password">

        </div>

        <div class="input-box">

<span>📅</span>

<select id="monthYear">

<option value="">
Select Month & Year
</option>

</select>

        </div>

        <button onclick="loginStudent()">
            Login
        </button>

        <p>
            Enter your valid Username & 
            Password to Check your Result.
        </p>

    </div>

    <script type="module" src="script.js"></script>


<div id="liveClock" class="live-clock"></div>

<div id="loader">

    <div class="spinner"></div>

    <p>Loading Result...</p>

</div>
