<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Student Login Portal</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- Background -->

    <div class="background">

        <div class="stars"></div>

        <div class="moon"></div>

        <div class="cloud cloud1"></div>

        <div class="cloud cloud2"></div>

        <div class="cloud cloud3"></div>

        <div class="mountains"></div>

        <div class="trees"></div>

        <div class="grass"></div>

        <div class="school-road"></div>

        <div class="balloon">

            🎈

        </div>

        <div class="plane">

            ✈️

        </div>

        <div class="book">

            📚

        </div>

        <div class="bag">

            🎒

        </div>

        <div class="cap">

            🎓

        </div>

    </div>

    <!-- Login Box -->

    <section class="login-area">

        <div class="glass-card">

            <div class="logo-circle">

                <i class="fa-solid fa-user-graduate"></i>

            </div>

            <h1>

                Student Login

            </h1>

            <p class="subtitle">

                Enter your valid Name and Roll Number

            </p>

            <form id="loginForm">

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="studentName"
                        placeholder="Name Of Student"
                        autocomplete="off"
                        required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-id-card"></i>

                    <input
                        type="number"
                        id="rollNumber"
                        placeholder="Roll Number"
                        required>

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember me

                    </label>

                    <a href="#">

                        Forgot Roll No.?

                    </a>

                </div>

                <button
                    type="submit"
                    class="login-btn">

                    Login

                </button>

                <p
                    id="message">

                </p>

            </form>

            <div class="bottom-text">

                Want to check your result?

                <br>

                Please enter your valid

                Name & Roll Number.

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
        <!-- Floating Sparkles -->

        <div class="sparkles">

            <span class="spark s1"></span>
            <span class="spark s2"></span>
            <span class="spark s3"></span>
            <span class="spark s4"></span>
            <span class="spark s5"></span>
            <span class="spark s6"></span>
            <span class="spark s7"></span>
            <span class="spark s8"></span>
            <span class="spark s9"></span>
            <span class="spark s10"></span>

        </div>

        <!-- Decorative Circles -->

        <div class="circle circle1"></div>

        <div class="circle circle2"></div>

        <div class="circle circle3"></div>

        <div class="circle circle4"></div>

        <!-- Floating Shapes -->

        <div class="shape triangle"></div>

        <div class="shape square"></div>

        <div class="shape diamond"></div>

        <!-- Light Rays -->

        <div class="light-rays">

            <span></span>
            <span></span>
            <span></span>
            <span></span>

        </div>

    </div>


    <!-- Decorative Glow -->

    <div class="page-glow"></div>


    <!-- Login Wrapper -->

    <div class="login-wrapper">

        <div class="glass-card">

            <div class="top-animation">

                <div class="pulse-ring"></div>

                <div class="logo-circle">

                    <i class="fa-solid fa-user-graduate"></i>

                </div>

            </div>

            <h1 class="heading">

                Student Login

            </h1>

            <p class="sub-heading">

                Login to view your examination result.

            </p>

            <form id="loginForm">

                <!-- Student Name -->

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="studentName"
                        placeholder="Name Of Student"
                        autocomplete="off"
                        required>

                </div>

                <!-- Roll Number -->

                <div class="input-box">

                    <i class="fa-solid fa-id-card"></i>

                    <input
                        type="number"
                        id="rollNumber"
                        placeholder="Roll Number"
                        required>

                </div>

                <!-- Remember -->

                <div class="option-area">

                    <label class="remember">

                        <input
                            type="checkbox"
                            id="remember">

                        <span>

                            Remember me

                        </span>

                    </label>

                    <a
                        href="#"
                        class="forgot">

                        Forgot Roll No.?

                    </a>

                </div>

                <!-- Login Button -->

                <button
                    type="submit"
                    class="login-btn">

                    Login

                </button>

                <!-- Message -->

                <p id="message"></p>

            </form>

            <div class="bottom-text">

                <p>

                    Want to check your result?

                </p>

                <small>

                    Enter your valid Name and Roll Number.

                </small>

            </div>

        </div>

    </div>
