<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Student Result</title>

<link rel="stylesheet"
href="result.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="background">

<div class="stars"></div>

<div class="gradient-circle one"></div>

<div class="gradient-circle two"></div>

<div class="gradient-circle three"></div>

</div>

<div class="container">

<div class="result-card">

<div class="top-header">

<div class="student-icon">

<i class="fa-solid fa-user-graduate"></i>

</div>

<h1>

Student Result

</h1>

<p>

Academic Session 2025-26

</p>

</div>

<div class="student-details">

<div class="detail">

<label>

Student Name

</label>

<span id="studentName">

Loading...

</span>

</div>

<div class="detail">

<label>

Roll Number

</label>

<span id="studentRoll">

Loading...

</span>

</div>

<div class="detail">

<label>

Status

</label>

<span id="studentStatus">

PASS

</span>

</div>

</div>

<h2>

Subject Wise Marks

</h2>

<table>

<thead>

<tr>

<th>Subject</th>

<th>Marks</th>

<th>Grade</th>

</tr>

</thead>

<tbody id="marksTable">

<!-- JavaScript -->

</tbody>

</table>
